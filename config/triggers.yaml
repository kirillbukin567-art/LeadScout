# config/triggers.yaml — словари триггер-фильтра, уровень 1 без LLM (ТЗ §7, §18).
#
# Это ПРИМЕР СТРУКТУРЫ с небольшим числом фраз на язык/категорию.
# Боевая версия должна содержать минимум 25/25/10/10 фраз на язык (pain/activity/
# partner_signals/anti_triggers — см. §18), генерируется разработчиком через LLM
# и валидируется заказчиком (RU/EN — обязательно). Далее словарь развивается
# командами управляющего бота (/dict add|del|list) без участия разработчика,
# все изменения версионируются в таблице dict_history (§18).
#
# Категории:
#   pain_exchange     — боль по текущей бирже (комиссии, вывод, блокировки)
#   activity          — признаки активной торговли (плечо, фьючерсы, PnL, ликвидации)
#   partner_signals   — признаки потенциального субпартнёра (аудитория, монетизация)
#   anti_triggers     — сразу в filtered_out (airdrop-хантинг, спам, казино-реклама)
#
# Матчинг — по вхождению подстроки/regex без учёта регистра (реализация в
# core/trigger_filter.py). Фразы можно писать как regex, если нужно (\bслово\b и т.п.).

