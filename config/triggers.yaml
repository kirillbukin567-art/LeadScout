# config/triggers.yaml — словари триггер-фильтра, уровень 1 без LLM (ТЗ §7, §18).
#
# Боевая версия (не пример): минимум 25/25/10/10 фраз на язык
# (pain_exchange/activity/partner_signals/anti_triggers) для RU/EN/ES/FR — по регламенту §18.
# Первая версия подготовлена разработчиком, валидация заказчиком (RU/EN — обязательна).
# Дальнейшее развитие — командами управляющего бота (/dict add|del|list, §18), без участия
# разработчика; все изменения версионируются в таблице dict_history.
#
# Категории:
#   pain_exchange     — боль по текущей бирже (комиссии, вывод, блокировки, поиск альтернативы)
#   activity          — признаки активной торговли (лонг/шорт, плечо, фьючерсы, ликвидации,
#                        funding, PnL, упоминания бирж-конкурентов в торговом контексте)
#   partner_signals   — признаки потенциального субпартнёра (канал, аудитория, монетизация)
#   anti_triggers     — сразу в filtered_out (airdrop-хантинг, раздачи/розыгрыши, казино, спам)
#
# Матчинг — по вхождению подстроки без учёта регистра (реализация в core/trigger_filter.py).
# Фразы намеренно многословные там, где это снижает риск ложных срабатываний
# (например "funding rate" вместо одиночного "funding", которое может встретиться в
# несвязанном контексте типа «funding» стартапа).

