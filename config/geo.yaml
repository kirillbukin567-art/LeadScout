# config/geo.yaml — гео-справочник (ТЗ §1, §2.6, §11, §14, §18).
# Готовит и развивает заказчик (методичка, раздел 8), это только шаблон-структура
# с целевыми странами первой волны из §1 ТЗ.
#
# Коды стран — ISO 3166-1 alpha-2. Один код может встречаться в нескольких
# списках одновременно (например high_risk почти всегда пересекается с
# cards_restricted, но списки логически независимы — проверяются отдельно).
#
#   allowed            — страны, где BingX доступен, лид может получать аутрич.
#   blocked            — страны, где BingX недоступен: лид помечается geo_status=
#                         blocked_geo и НЕ получает аутрич (§2.6).
#   high_risk          — лид принимается только через ручное решение оператора
#                         (не автоматизируется даже в режиме M2/M3).
#   cards_restricted   — в черновики диалога автоматически добавляется честная
#                         оговорка про пополнение через крипто/P2P (карты не работают).
#   lowered_priority    — не блокируются, но идут ниже в очереди (например ЕС до
#                         одобрения MiCA-авторизации BingX EU, см. §1).

allowed:
  - code: RU
    name: "Россия"
  - code: KG
    name: "Киргизия"
  - code: PE
    name: "Перу"
  - code: AR
    name: "Аргентина"
  - code: BR
    name: "Бразилия"
  - code: SN
    name: "Сенегал"
  - code: BF
    name: "Буркина-Фасо"
  - code: TG
    name: "Того"
  - code: NG
    name: "Нигерия"
  - code: PK
    name: "Пакистан"
    note: "high_risk — см. ниже, автоматический аутрич запрещён"

# Пример структуры — реальный список стран, где BingX недоступен,
# заполняется и поддерживается заказчиком.
blocked:
  - code: US
    name: "США (пример)"
    reason: "Требует проверки доступности BingX по актуальному списку заказчика"

high_risk:
  - PK

cards_restricted:
  - KG
  - NG
  - PK

lowered_priority:
  - note: "ЕС — пониженный приоритет до одобрения MiCA-авторизации BingX EU (заявка в FMA Австрии, §1)"
    codes:
      - AT
      - DE
      - FR
      - ES
      - IT
      - NL
      - PL
